<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compatibility Conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #312920;
      --muted: #6f6558;
      --brand: #b65c4c;
      --brand-2: #d89a61;
      --panel: #fffdf9;
      --shadow: 0 28px 65px rgba(73, 43, 25, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, #f5d9ce 0, transparent 35%),
        radial-gradient(circle at 86% 84%, #efe1c4 0, transparent 35%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 1.2rem;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid #f1e5d8;
      padding: 2rem 1.35rem;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      line-height: 1.2;
    }

    p {
      margin: 0.9rem auto 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 54ch;
    }

    a {
      display: inline-block;
      margin-top: 1.4rem;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      filter: brightness(1.04);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Compatibility Conversation</h1>
    <p>This form is designed for a respectful pre-marriage discussion. It covers values, emotional connection, expectations, and future planning.</p>
    <a href="./questionnaire.html">Start the Form</a>
  </main>
</body>
</html>
