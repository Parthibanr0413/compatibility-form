<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compatibility Conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff2f5;
      --card: #fffdf9;
      --ink: #36272d;
      --muted: #7a5f69;
      --line: #f1d5de;
      --brand: #e35d8d;
      --brand-2: #f39a64;
      --accent: #6f4b9f;
      --ok: #2c7a52;
      --focus: 0 0 0 3px rgba(227, 93, 141, 0.22);
      --shadow: 0 25px 60px rgba(158, 73, 99, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 14%, #ffd1e0 0, transparent 35%),
        radial-gradient(circle at 82% 80%, #ffe4ba 0, transparent 37%),
        radial-gradient(circle at 80% 14%, #e8d8ff 0, transparent 33%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 1.4rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "❤";
      position: fixed;
      font-size: clamp(5rem, 12vw, 11rem);
      color: rgba(227, 93, 141, 0.1);
      z-index: 0;
      pointer-events: none;
      user-select: none;
      transform: rotate(-12deg);
    }

    body::before {
      top: 3%;
      left: 3%;
    }

    body::after {
      bottom: 5%;
      right: 4%;
      transform: rotate(10deg);
    }

    .shell {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid #f4e9dd;
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .head {
      padding: 1.3rem 1.4rem 0.8rem;
      background: linear-gradient(130deg, rgba(227, 93, 141, 0.14), rgba(243, 154, 100, 0.19), rgba(111, 75, 159, 0.13));
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      margin: 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7f5448;
      font-weight: 700;
    }

    h1 {
      margin: 0.4rem 0 0;
      font-family: "Dancing Script", cursive;
      font-size: clamp(1.45rem, 2vw, 2rem);
      line-height: 1.2;
      letter-spacing: 0.02em;
      color: #9f2f66;
    }

    .sub {
      margin: 0.55rem 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
      max-width: 65ch;
    }

    .progress-wrap {
      padding: 0.9rem 1.4rem 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .progress {
      height: 10px;
      background: #fae7ee;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      transition: width 220ms ease;
    }

    form {
      padding: 1.2rem 1.4rem 1.45rem;
    }

    .q-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 1.05rem;
      background: linear-gradient(180deg, #ffffff, #fff9fb);
      min-height: 205px;
      animation: fade 260ms ease;
    }

    .section {
      display: inline-block;
      margin: 0;
      font-size: 0.73rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .q-title {
      margin: 0.35rem 0 0;
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.4;
      font-weight: 700;
    }

    .req {
      color: #cb255a;
      font-weight: 700;
      margin-left: 0.25rem;
      font-size: 0.9em;
    }

    .input-wrap {
      margin-top: 1rem;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdfd;
      border-radius: 12px;
      padding: 0.72rem 0.78rem;
      font: inherit;
      color: var(--ink);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: none;
      box-shadow: var(--focus);
      border-color: #e35d8d;
    }

    .options {
      display: grid;
      gap: 0.65rem;
      margin-top: 0.25rem;
    }

    .option {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.65rem 0.7rem;
      background: #fffafb;
      transition: border-color 150ms ease, background 150ms ease;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
    }

    .option:hover {
      border-color: #ec93b2;
      background: #fff0f5;
    }

    .scale {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 0.45rem;
      margin-top: 0.25rem;
    }

    .scale label {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.45rem 0;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      background: #fff9fb;
      font-size: 0.92rem;
    }

    .scale input {
      display: none;
    }

    .scale input:checked + span {
      color: #fff;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      border-radius: 8px;
      display: inline-block;
      padding: 0.2rem 0.42rem;
      min-width: 1.5rem;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      margin-top: 0.95rem;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 0.72rem 1.05rem;
    }

    .btn-back {
      background: #f7e6ee;
      color: #6e4357;
    }

    .btn-next {
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #fff;
      min-width: 160px;
    }

    .status {
      min-height: 1.15rem;
      margin: 0.55rem 0 0;
      font-weight: 600;
      color: #b22e5a;
      font-size: 0.9rem;
    }

    .success {
      color: var(--ok);
    }

    .hide {
      display: none;
    }

    .bot {
      position: absolute;
      left: -100vw;
      top: -100vh;
      opacity: 0;
    }

    .hint {
      margin: 0.65rem 0 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .summary {
      margin-top: 1rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 0.8rem;
      max-height: 55vh;
      overflow: auto;
    }

    .summary-item {
      padding: 0.55rem 0;
      border-bottom: 1px dashed #efd7e0;
    }

    .summary-item:last-child {
      border-bottom: 0;
    }

    .summary-q {
      margin: 0;
      font-weight: 700;
      color: #7f2a56;
      font-size: 0.92rem;
    }

    .summary-a {
      margin: 0.25rem 0 0;
      color: var(--ink);
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 0.92rem;
    }

    .love-note {
      margin: 0.35rem 0 0;
      color: #9d4d74;
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      .head,
      .progress-wrap,
      form {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .q-card {
        min-height: 185px;
      }

      .scale {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="head">
      <p class="kicker">Compatibility Form</p>
      <h1>Compatibility Conversation</h1>
      <p class="love-note">Built with care, honesty, and love.</p>
      <p class="sub">A respectful pre-marriage conversation to understand values, expectations, emotional connection, and future goals.</p>
    </header>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="stepLabel">Question 1</span>
        <span id="stepCount">1 / 34</span>
      </div>
      <div class="progress">
        <div id="bar" class="bar"></div>
      </div>
    </div>

    <form id="form" novalidate>
      <label class="bot" aria-hidden="true">Leave this empty <input type="text" id="botField" autocomplete="off" /></label>

      <section class="q-card">
        <p id="section" class="section"></p>
        <h2 id="question" class="q-title"></h2>
        <div id="inputWrap" class="input-wrap"></div>
        <p id="hint" class="hint"></p>
      </section>

      <div class="actions">
        <button id="backBtn" type="button" class="btn-back">Back</button>
        <button id="nextBtn" type="button" class="btn-next">Next</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGeOPHkkd7ezxZpg-q-SON1Uq3DVIQCwFV2qdciAJ72awreQmzU1eih9wwQkdpVgYJ/exec";

    const questions = [
      { id: "q1_name", section: "Basic", q: "1) Name", type: "text", required: true },
      { id: "q2_comm", section: "Basic", q: "2) Preferred communication", type: "radio", options: ["Call", "Text", "Video", "In person"] },
      { id: "q3_city", section: "Basic", q: "3) Current city", type: "text" },

      { id: "q4_priorities", section: "Life Priorities", q: "4) Top 3 priorities now", type: "textarea", required: true },
      { id: "q5_career", section: "Life Priorities", q: "5) Importance of career growth", type: "scale" },
      { id: "q6_family", section: "Life Priorities", q: "6) Importance of family time", type: "scale" },

      { id: "q7_healthy_marriage", section: "Marriage Expectations", q: "7) What is a healthy marriage to you?", type: "textarea", required: true },
      { id: "q8_expectations", section: "Marriage Expectations", q: "8) Expectations from partner", type: "textarea", required: true },
      { id: "q9_living", section: "Marriage Expectations", q: "9) Preferred living setup after marriage", type: "radio", options: ["With family", "Separate nearby", "Different city", "Open to discussion"] },

      { id: "q10_food", section: "Lifestyle", q: "10) Food preference", type: "radio", options: ["Veg", "Non-veg", "Eggetarian", "Other"] },
      { id: "q11_relocation", section: "Lifestyle", q: "11) Comfortable with travel/relocation?", type: "radio", options: ["Yes", "No"] },
      { id: "q11_location_pref", section: "Lifestyle", q: "If no, what location preferences do you have?", type: "textarea", conditional: (a) => a.q11_relocation === "No" },
      { id: "q12_disagreements", section: "Lifestyle", q: "12) How do you handle disagreements?", type: "radio", options: ["Calm discussion", "Need time", "Seek family advice", "Other"] },

      { id: "q13_finance_view", section: "Finance & Future", q: "13) View on financial planning in marriage", type: "textarea" },
      { id: "q14_budget", section: "Finance & Future", q: "14) Should both partners join budgeting decisions?", type: "radio", options: ["Yes", "No"] },
      { id: "q14_how_decide", section: "Finance & Future", q: "If no, how should financial decisions be made?", type: "textarea", conditional: (a) => a.q14_budget === "No" },
      { id: "q15_timeline", section: "Finance & Future", q: "15) Timeline preference for kids/home/career moves", type: "textarea" },

      { id: "q16_why_partner", section: "Emotional Connection & Love Language", q: "16) Why do you want a life partner?", type: "textarea", required: true },
      { id: "q17_feel_loved", section: "Emotional Connection & Love Language", q: "17) What makes you feel most loved?", type: "radio", options: ["Daily gestures", "Quality time", "Verbal appreciation", "Practical support", "Physical affection"] },
      { id: "q18_matters_more", section: "Emotional Connection & Love Language", q: "18) Which matters more?", type: "radio", options: ["Consistency in small acts", "Emotional depth in meaningful moments", "Both"] },
      { id: "q19_scenario", section: "Emotional Connection & Love Language", q: "19) Scenario: A husband buys flowers daily. Another buys less often but personally places flowers in wife's hair. What feels like love to you and why?", type: "textarea" },
      { id: "q20_partner_express", section: "Emotional Connection & Love Language", q: "20) How do you want your partner to express love?", type: "textarea" },
      { id: "q21_you_express", section: "Emotional Connection & Love Language", q: "21) How do you express love?", type: "textarea" },
      { id: "q22_stress_support", section: "Emotional Connection & Love Language", q: "22) When stressed, what support do you want?", type: "radio", options: ["Listen", "Advise", "Give space", "Physical comfort", "Depends"] },
      { id: "q23_time", section: "Emotional Connection & Love Language", q: "23) Expected meaningful couple time?", type: "radio", options: ["Daily", "Few times a week", "Weekly", "Flexible"] },
      { id: "q24_hurts", section: "Emotional Connection & Love Language", q: "24) What hurts most?", type: "radio", options: ["Poor communication", "Low effort", "Disrespect", "Broken promises", "Emotional distance"] },
      { id: "q25_repair", section: "Emotional Connection & Love Language", q: "25) After argument, best repair style?", type: "radio", options: ["Talk now", "Take time then talk", "Apology then discuss", "Message then talk"] },
      { id: "q26_appreciation", section: "Emotional Connection & Love Language", q: "26) Importance of verbal appreciation", type: "scale" },
      { id: "q27_receive", section: "Emotional Connection & Love Language", q: "27) Love language you receive best", type: "radio", options: ["Words", "Quality time", "Acts of service", "Gifts", "Physical touch"] },
      { id: "q28_give", section: "Emotional Connection & Love Language", q: "28) Love language you naturally give", type: "radio", options: ["Words", "Quality time", "Acts of service", "Gifts", "Physical touch"] },
      { id: "q29_affection", section: "Emotional Connection & Love Language", q: "29) Affection preference", type: "radio", options: ["Mostly private", "Mostly public", "Both"] },
      { id: "q30_safe", section: "Emotional Connection & Love Language", q: "30) What makes you feel emotionally safe?", type: "textarea" },
      { id: "q31_emotional_need", section: "Emotional Connection & Love Language", q: "31) One emotional need partner must understand deeply", type: "textarea" },

      { id: "q32_non_negotiables", section: "Open", q: "32) Non-negotiables", type: "textarea" },
      { id: "q33_flexible", section: "Open", q: "33) Flexible areas", type: "textarea" },
      { id: "q34_anything_else", section: "Open", q: "34) Anything else to share?", type: "textarea" },
      { id: "q35_like_profile", section: "Open", q: "35) Why do you like my profile?", type: "textarea", required: true }
    ];

    const answers = {};
    let index = 0;
    const submittedAt = Date.now();

    const sectionEl = document.getElementById("section");
    const questionEl = document.getElementById("question");
    const inputWrapEl = document.getElementById("inputWrap");
    const stepLabelEl = document.getElementById("stepLabel");
    const stepCountEl = document.getElementById("stepCount");
    const barEl = document.getElementById("bar");
    const statusEl = document.getElementById("status");
    const hintEl = document.getElementById("hint");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    const visibleQuestions = () => questions.filter((item) => (typeof item.conditional === "function" ? item.conditional(answers) : true));

    function createTextInput(id, value = "") {
      const input = document.createElement("input");
      input.type = "text";
      input.id = id;
      input.value = value;
      input.autocomplete = "off";
      return input;
    }

    function createTextarea(id, value = "") {
      const t = document.createElement("textarea");
      t.id = id;
      t.value = value;
      return t;
    }

    function createOptions(question) {
      const box = document.createElement("div");
      box.className = "options";
      question.options.forEach((opt) => {
        const id = `${question.id}_${opt.replace(/\s+/g, "_").toLowerCase()}`;
        const label = document.createElement("label");
        label.className = "option";
        label.htmlFor = id;

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = question.id;
        radio.id = id;
        radio.value = opt;
        if (answers[question.id] === opt) radio.checked = true;

        const text = document.createElement("span");
        text.textContent = opt;

        label.appendChild(radio);
        label.appendChild(text);
        box.appendChild(label);
      });
      return box;
    }

    function createScale(question) {
      const scale = document.createElement("div");
      scale.className = "scale";
      for (let i = 1; i <= 10; i += 1) {
        const id = `${question.id}_${i}`;
        const label = document.createElement("label");
        label.htmlFor = id;

        const input = document.createElement("input");
        input.type = "radio";
        input.name = question.id;
        input.id = id;
        input.value = String(i);
        if (String(answers[question.id] || "") === String(i)) input.checked = true;

        const span = document.createElement("span");
        span.textContent = i;

        label.appendChild(input);
        label.appendChild(span);
        scale.appendChild(label);
      }
      return scale;
    }

    function collectAnswer(question) {
      if (question.type === "text" || question.type === "textarea") {
        const el = document.getElementById(question.id);
        return el ? el.value.trim() : "";
      }

      if (question.type === "radio" || question.type === "scale") {
        const checked = document.querySelector(`input[name="${question.id}"]:checked`);
        return checked ? checked.value : "";
      }

      return "";
    }

    function validate(question, value) {
      if (!question.required) return true;
      return String(value || "").trim().length > 0;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function buildSummaryHtml() {
      const items = questions.map((q) => {
        const asked = typeof q.conditional === "function" ? q.conditional(answers) : true;
        const value = answers[q.id] || "";
        let shown = "Not answered";
        if (!asked) shown = "Not applicable";
        if (asked && value.trim()) shown = value;
        return `
          <div class="summary-item">
            <p class="summary-q">${escapeHtml(q.q)}</p>
            <p class="summary-a">${escapeHtml(shown)}</p>
          </div>
        `;
      }).join("");
      return `<div class="summary">${items}</div>`;
    }

    function saveCurrentAnswer() {
      const current = visibleQuestions()[index];
      if (!current) return true;
      const value = collectAnswer(current);
      if (!validate(current, value)) {
        statusEl.textContent = "This question is required.";
        return false;
      }
      answers[current.id] = value;
      statusEl.textContent = "";
      return true;
    }

    function render() {
      const list = visibleQuestions();
      if (index >= list.length) index = list.length - 1;
      if (index < 0) index = 0;

      const current = list[index];
      sectionEl.textContent = current.section;
      questionEl.innerHTML = `${current.q}${current.required ? '<span class="req">*</span>' : ""}`;
      inputWrapEl.innerHTML = "";

      if (current.type === "text") {
        inputWrapEl.appendChild(createTextInput(current.id, answers[current.id] || ""));
      } else if (current.type === "textarea") {
        inputWrapEl.appendChild(createTextarea(current.id, answers[current.id] || ""));
      } else if (current.type === "radio") {
        inputWrapEl.appendChild(createOptions(current));
      } else if (current.type === "scale") {
        inputWrapEl.appendChild(createScale(current));
      }

      const total = list.length;
      const currentStep = index + 1;
      stepLabelEl.textContent = `Question ${currentStep}`;
      stepCountEl.textContent = `${currentStep} / ${total}`;
      barEl.style.width = `${Math.round((currentStep / total) * 100)}%`;

      backBtn.disabled = index === 0;
      nextBtn.textContent = currentStep === total ? "Submit" : "Next";
      hintEl.textContent = current.required ? "Required question" : "Optional question";

      const focusTarget = inputWrapEl.querySelector("input, textarea");
      if (focusTarget) focusTarget.focus();
    }

    async function submitForm() {
      const botField = document.getElementById("botField").value.trim();
      if (botField) {
        statusEl.textContent = "Spam check failed.";
        return;
      }

      if (Date.now() - submittedAt < 2500) {
        statusEl.textContent = "Please take a moment before submitting.";
        return;
      }

      statusEl.textContent = "Submitting...";
      statusEl.classList.remove("success");

      const payload = {
        submitted_at: new Date().toISOString(),
        form_title: "Compatibility Conversation"
      };
      const questionIds = [...new Set(questions.map((q) => q.id))];
      questionIds.forEach((id) => {
        payload[id] = answers[id] || "";
      });

      try {
        if (GOOGLE_SCRIPT_URL) {
          const body = new URLSearchParams();
          Object.entries(payload).forEach(([key, value]) => body.append(key, String(value)));
          await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            body,
            mode: "no-cors",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" }
          });
        } else {
          statusEl.textContent = "Google Sheets URL is missing. Set GOOGLE_SCRIPT_URL first.";
          return;
        }

        document.getElementById("form").innerHTML = `
          <section class="q-card">
            <p class="section">Completed</p>
            <h2 class="q-title">Thank you for sharing honestly.</h2>
            <p class="sub">This helps us have a meaningful conversation.</p>
            ${buildSummaryHtml()}
          </section>
        `;
      } catch (err) {
        statusEl.textContent = "Submission failed. Please try again.";
        return;
      }

      statusEl.textContent = "Submitted successfully.";
      statusEl.classList.add("success");
    }

    backBtn.addEventListener("click", () => {
      if (!saveCurrentAnswer()) return;
      index -= 1;
      render();
    });

    nextBtn.addEventListener("click", async () => {
      if (!saveCurrentAnswer()) return;

      const list = visibleQuestions();
      if (index === list.length - 1) {
        await submitForm();
        return;
      }

      index += 1;
      render();
    });

    render();
  </script>
</body>
</html>
