<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compatibility Conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff2f5;
      --ink: #36272d;
      --muted: #7a5f69;
      --brand: #e35d8d;
      --brand-2: #f39a64;
      --panel: #fffdf9;
      --shadow: 0 28px 65px rgba(158, 73, 99, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, #ffd1e0 0, transparent 35%),
        radial-gradient(circle at 86% 84%, #ffe4ba 0, transparent 35%),
        radial-gradient(circle at 80% 14%, #e8d8ff 0, transparent 33%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 1.2rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "❤";
      position: fixed;
      font-size: clamp(5rem, 12vw, 11rem);
      color: rgba(227, 93, 141, 0.1);
      z-index: 0;
      pointer-events: none;
      user-select: none;
      transform: rotate(-12deg);
    }

    body::before {
      top: 3%;
      left: 3%;
    }

    body::after {
      bottom: 5%;
      right: 4%;
      transform: rotate(10deg);
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid #f1e5d8;
      padding: 2rem 1.35rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-family: "Dancing Script", cursive;
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      line-height: 1.2;
      color: #9f2f66;
    }

    p {
      margin: 0.9rem auto 0;
      color: var(--muted);
      line-height: 1.6;
      max-width: 54ch;
    }

    a {
      display: inline-block;
      margin-top: 1.4rem;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      filter: brightness(1.04);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Compatibility Conversation</h1>
    <p style="margin-top:0.25rem;color:#9d4d74;">Built with care, honesty, and love.</p>
    <p>This form is designed for a respectful pre-marriage discussion. It covers values, emotional connection, expectations, and future planning.</p>
    <a href="./questionnaire.html">Start the Form</a>
  </main>
</body>
</html>
